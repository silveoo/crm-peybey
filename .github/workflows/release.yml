name: Build desktop artifacts
on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional version override
        required: false
jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run tauri build -- --bundles nsis
      - uses: actions/upload-artifact@v4
        with: {name: windows-nsis, path: src-tauri/target/release/bundle/nsis/*.exe}
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run tauri build -- --bundles app,dmg
      - uses: actions/upload-artifact@v4
        with: {name: macos-bundle, path: src-tauri/target/release/bundle/**}
